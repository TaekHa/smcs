# Story 4.6 — External nginx (SSL termination + reverse proxy).
# HTTPS terminates here; backend and frontend containers stay HTTP-internal.
# Mount this file read-only at /etc/nginx/nginx.conf in the docker compose.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # backend caps multipart upload at 10MB (application.yml); allow modest
    # multipart envelope overhead before nginx itself rejects with 413.
    client_max_body_size 15m;
    client_body_timeout 60s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    upstream smcs_backend {
        server backend:8080;
        keepalive 32;
    }

    upstream smcs_frontend {
        server frontend:80;
        keepalive 16;
    }

    # ----- HTTP :80 — redirect everything to HTTPS once the cert is in place.
    # If you must run without TLS during initial provisioning, comment the
    # `return 301` and uncomment the location blocks below.
    server {
        listen 80;
        server_name _;

        # Let's Encrypt http-01 challenge path (only used as fallback; the
        # provisioned method per Deviation #4 is dns-01).
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health probe over HTTP so the docker healthcheck and internal
        # monitoring don't trip over the HTTPS redirect (Story 4.6 Task 8
        # P2 fix). Strips the /api prefix because Spring exposes /actuator/*.
        location = /api/actuator/health {
            access_log off;
            proxy_pass http://smcs_backend/actuator/health;
            proxy_set_header Host $host;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----- HTTPS :443 — terminates TLS, forwards to backend/frontend.
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # Cert paths — operations.md documents two layouts:
        #   (a) copy/symlink Let's Encrypt fullchain.pem + privkey.pem here, or
        #   (b) mount /etc/letsencrypt directly and edit these two lines.
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS + minimal hardening headers (forwarded to all clients).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # /api/actuator/health → backend /actuator/health (strip /api prefix
        # so the documented external probe `curl -k https://host/api/actuator/health`
        # works while keeping Spring's actuator routes off the /api namespace).
        # Must come BEFORE the catch-all /api/ block — exact-match wins.
        location = /api/actuator/health {
            access_log off;
            proxy_pass http://smcs_backend/actuator/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /api/* → Spring backend. Streaming preserved for file download.
        location /api/ {
            proxy_pass http://smcs_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # File download streams through; buffering would force temp files.
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Backend health endpoint reachable without /api prefix for nginx upstream probes
        # or external monitoring; reuses the same upstream.
        location = /healthz/backend {
            access_log off;
            proxy_pass http://smcs_backend/actuator/health;
            proxy_set_header Host $host;
        }

        # Everything else → frontend SPA container.
        location / {
            proxy_pass http://smcs_frontend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
