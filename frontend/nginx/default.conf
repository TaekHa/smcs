# Story 4.6 — frontend container nginx (static SPA serving only).
# SSL termination + /api/* reverse proxy live in the external nginx (Task 3).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip — text assets benefit most; images/fonts are already compressed.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # Vite emits hashed asset filenames under /assets/ — safe to cache for 1 year.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached — it pins the current asset hashes.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # SPA fallback — React Router owns client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight healthcheck endpoint for the external nginx upstream probe.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
