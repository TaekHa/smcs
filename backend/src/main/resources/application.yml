server:
  port: 8080

spring:
  application:
    name: smcs
  datasource:
    url:
    username:
    password:
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
# Story 4.6 — Actuator gated to /health only; nginx + docker probe it
# unauthenticated (Deviation #6). show-details=never hides DB validation
# query, disk space, and other internals from the public response.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

smcs:
  files:
    dir: ${SMCS_FILES_DIR:/var/smcs/files}
  jwt:
    secret: ${SMCS_JWT_SECRET:}
    expiration-seconds: 28800
  rate-limit:
    per-user-per-minute: 300
  crypto:
    data-key: ${SMCS_DATA_KEY:}
    hmac-key: ${SMCS_HMAC_KEY:}
  reports:
    # Story 3.4 — auto-generate yesterday's daily / last week's weekly report (KST).
    # Override via SMCS_REPORTS_*_CRON env vars (Spring cron, 6 fields, zone KST).
    daily-cron: ${SMCS_REPORTS_DAILY_CRON:0 0 8 * * *}
    weekly-cron: ${SMCS_REPORTS_WEEKLY_CRON:0 0 8 * * MON}
    # Story 3.5 — 03:00 KST daily cleanup of reports older than retention-days.
    # First production deploys SHOULD start with this cron disabled (e.g. "0 0 5 31 2 *",
    # an unreachable date) until the archive has been verified for ~1 week (PO Deviation #8).
    cleanup-cron: ${SMCS_REPORTS_CLEANUP_CRON:0 0 3 * * *}
    retention-days: ${SMCS_REPORTS_RETENTION_DAYS:90}
